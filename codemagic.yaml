workflows:
  ios-app-store:
    name: MODU/TABLE iOS App Store
    max_build_duration: 30
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.modutable.app
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          xcodegen generate
      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR
          xcode-project build-ipa \
            --project MODUTABLE.xcodeproj \
            --scheme MODUTABLE \
            --archive-path build/MODUTABLE.xcarchive \
            --export-path build/ipa
    artifacts:
      - build/ipa/*.ipa
    publishing:

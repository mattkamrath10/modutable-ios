workflows:
  ios-app-store:
    name: MODU/TABLE iOS App Store
    max_build_duration: 30
    environment:
      vars:
        BUNDLE_ID: com.modutable.app
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          xcodegen generate
      - name: Set credentials, generate cert key, fetch signing files
        script: |
          # Decode base64-encoded API key (avoids Codemagic secret detection corrupting PEM)
          echo "LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCk1JR1RBZ0VBTUJNR2J5cUdTTTQ5QWdFR0NDcUdT" \
               "TTQ5QXdFSEJIa3dkd0lCQVFRZ283TzVaK29hclFNalY0U1oKaG1ZcFRVZVkxZmlLWXVEWEtveXM5" \
               "d3ZaUEU2Z0NnWUlLb1pJemowREFRZWhSQU5DQUFURnVDU29mQ3hEMzEvawo1RXRhbW1EcUR3c0lo" \
               "TUxRRlJyMUtlcmc2aWV1UlBqSWpVWG5oZjFkeGpjbStmK2wyaUk0cVpLelgzVDdnV1R5CllaUHI4" \
               "RjhaCi0tLS0tRU5EIFBSSVZBVEUgS0VZLS0tLS0K" | base64 -d > /tmp/AuthKey.p8
          # Clear any corrupted env vars Codemagic may have auto-created
          unset APP_STORE_CONNECT_PRIVATE_KEY
          unset APP_STORE_PRIVATE_KEY
          unset APP_STORE_PRIVATE_KEY_2
          unset APP_STORE_PRIVATE_KEY_3
          export APP_STORE_CONNECT_ISSUER_ID="69c32014-81c0-4654-8dc5-7fd1cfb07338"
          export APP_STORE_CONNECT_KEY_IDENTIFIER="ML292A3H9X"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat /tmp/AuthKey.p8)"
          echo "Key starts with: $(head -1 /tmp/AuthKey.p8)"
          echo "Key ends with: $(tail -1 /tmp/AuthKey.p8)"
          echo "Key length: $(wc -c < /tmp/AuthKey.p8) bytes"
          keychain initialize
          openssl genrsa -out /tmp/cert_key.pem 2048
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @file:/tmp/cert_key.pem \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"
          keychain add-certificates
      - name: Build IPA with explicit signing
        script: |
          cd $CM_BUILD_DIR
          # Find the provisioning profile UUID
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROFILE_PATH" ]; then
            echo "ERROR: No provisioning profile found"
            exit 1
          fi
          UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          echo "Using provisioning profile UUID: $UUID"
          # Archive with explicit profile
          xcodebuild -project MODUTABLE.xcodeproj \
            -scheme MODUTABLE \
            -archivePath build/MODUTABLE.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$UUID" \
            DEVELOPMENT_TEAM=8FJX2N8YXT \
            COMPILER_INDEX_STORE_ENABLE=NO
          # Create export options plist
          cat > /tmp/exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>8FJX2N8YXT</string>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF
          # Export IPA
          xcodebuild -exportArchive \
            -archivePath build/MODUTABLE.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist /tmp/exportOptions.plist
    artifacts:
      - build/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID

workflows:
  ios-app-store:
    name: MODU/TABLE iOS App Store
    max_build_duration: 30
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.modutable.app
      vars:
        APP_STORE_ISSUER_ID: "69c32014-81c0-4654-8dc5-7fd1cfb07338"
        APP_STORE_KEY_ID: "ML292A3H9X"
        APP_STORE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nMIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQgo7O5Z+oarQMjV4SZ\nhmYpTUeY1fiKYuDXKoys9wvZPE6gCgYIKoZIzj0DAQehRANCAATFuCSofCxD31/k\n5EtammDqDwsIhMLQFRr1Kerg6ieuRPjIjUXnhf1dxjcm+f+l2iI4qZKzX3T7gWTy\nYZPr8F8Z\n-----END PRIVATE KEY-----"
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          xcodegen generate
      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR
          xcode-project build-ipa \
            --project MODUTABLE.xcodeproj \
            --scheme MODUTABLE \
            --archive-path build/MODUTABLE.xcarchive \
            --export-path build/ipa
    artifacts:
      - build/ipa/*.ipa
    publishing:
      app_store_connect:
        issuer_id: $APP_STORE_ISSUER_ID
        key_id: $APP_STORE_KEY_ID
        private_key: $APP_STORE_PRIVATE_KEY
        submit_for_review: false

workflows:
  ios-app-store:
    name: MODU/TABLE iOS App Store
    max_build_duration: 30
    environment:
      vars:
        BUNDLE_ID: com.modutable.app
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          xcodegen generate
      - name: Set credentials, revoke stale certs, fetch signing files
        script: |
          cat > /tmp/AuthKey.p8 << 'ENDOFKEY'
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQgo7O5Z+oarQMjV4SZ
          hmYpTUeY1fiKYuDXKoys9wvZPE6gCgYIKoZIzj0DAQehRANCAATFuCSofCxD31/k
          5EtammDqDwsIhMLQFRr1Kerg6ieuRPjIjUXnhf1dxjcm+f+l2iI4qZKzX3T7gWTy
          YZPr8F8Z
          -----END PRIVATE KEY-----
          ENDOFKEY
          export APP_STORE_CONNECT_ISSUER_ID="69c32014-81c0-4654-8dc5-7fd1cfb07338"
          export APP_STORE_CONNECT_KEY_IDENTIFIER="ML292A3H9X"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat /tmp/AuthKey.p8)"
          keychain initialize
          # List and revoke existing distribution certificates
          echo "Checking for existing distribution certificates..."
          CERTS=$(app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --json 2>/dev/null || echo "[]")
          echo "$CERTS"
          CERT_IDS=$(echo "$CERTS" | python3 -c "import sys,json; data=json.load(sys.stdin); [print(c['id']) for c in data]" 2>/dev/null || echo "")
          for id in $CERT_IDS; do
            echo "Revoking existing certificate: $id"
            app-store-connect certificates delete "$id" \
              --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
              --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
              --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" || true
          done
          # Now fetch signing files with --create (will create fresh cert + profile)
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"
          keychain add-certificates
      - name: Build IPA with explicit signing
        script: |
          cd $CM_BUILD_DIR
          # Find the provisioning profile UUID
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROFILE_PATH" ]; then
            echo "ERROR: No provisioning profile found"
            exit 1
          fi
          UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          echo "Using provisioning profile UUID: $UUID"
          # Archive with explicit profile
          xcodebuild -project MODUTABLE.xcodeproj \
            -scheme MODUTABLE \
            -archivePath build/MODUTABLE.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$UUID" \
            DEVELOPMENT_TEAM=8FJX2NBYXT \
            COMPILER_INDEX_STORE_ENABLE=NO
          # Create export options plist
          cat > /tmp/exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>8FJX2NBYXT</string>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF
          # Export IPA
          xcodebuild -exportArchive \
            -archivePath build/MODUTABLE.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist /tmp/exportOptions.plist
    artifacts:
      - build/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID

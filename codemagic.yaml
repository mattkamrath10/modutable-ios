workflows:
  ios-app-store:
    name: MODU/TABLE iOS App Store
    max_build_duration: 30
    environment:
      vars:
        BUNDLE_ID: com.modutable.app
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          xcodegen generate
      - name: Download and install signing files
        script: |
          # Download the .p12 and .mobileprovision from our server
          curl -sL "https://base44.app/api/apps/6a610ab86db461e7becf254b/files/mp/public/6a610ab86db461e7becf254b/5bae654a8_modutable.p12" -o /tmp/cert.p12
          curl -sL "https://base44.app/api/apps/6a610ab86db461e7becf254b/files/mp/public/6a610ab86db461e7becf254b/a77499660_576247e81_MODUTABLE_App_Store1.mobileprovision" -o /tmp/profile.mobileprovision
          
          echo "=== Downloaded files ==="
          ls -la /tmp/cert.p12 /tmp/profile.mobileprovision
          file /tmp/cert.p12
          file /tmp/profile.mobileprovision
          
          # Verify the .p12 is valid
          openssl pkcs12 -info -in /tmp/cert.p12 -passin pass:modutable -nokeys 2>/dev/null | head -5
          
          # Create a keychain and import the certificate
          KEYCHAIN_PATH="/Users/builder/Library/codemagic-cli-tools/keychains/signing.keychain-db"
          KEYCHAIN_PASS="modutable"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          
          # Import the .p12 into the keychain
          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" -P modutable -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          
          echo "=== Keychain certificates ==="
          security find-certificate -a "$KEYCHAIN_PATH" | head -20
          
          # Install the provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          
          echo "=== Provisioning profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Build IPA with explicit signing
        script: |
          cd $CM_BUILD_DIR
          # Find the provisioning profile UUID
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROFILE_PATH" ]; then
            echo "ERROR: No provisioning profile found"
            exit 1
          fi
          UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          echo "Using provisioning profile UUID: $UUID"
          # Archive with explicit profile
          xcodebuild -project MODUTABLE.xcodeproj \
            -scheme MODUTABLE \
            -archivePath build/MODUTABLE.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$UUID" \
            DEVELOPMENT_TEAM=8FJX2N8YXT \
            COMPILER_INDEX_STORE_ENABLE=NO \
            OTHER_CODE_SIGN_FLAGS="--keychain /Users/builder/Library/codemagic-cli-tools/keychains/signing.keychain-db"
          # Create export options plist
          cat > /tmp/exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>8FJX2N8YXT</string>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF
          # Export IPA
          xcodebuild -exportArchive \
            -archivePath build/MODUTABLE.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist /tmp/exportOptions.plist
    artifacts:
      - build/ipa/*.ipa

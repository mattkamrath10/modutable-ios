workflows:
  ios-app-store:
    name: MODU/TABLE iOS App Store
    max_build_duration: 30
    environment:
      vars:
        BUNDLE_ID: com.modutable.app
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          xcodegen generate
      - name: Set credentials and fetch signing files
        script: |
          cat > /tmp/AuthKey.p8 << 'ENDOFKEY'
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQgo7O5Z+oarQMjV4SZ
          hmYpTUeY1fiKYuDXKoys9wvZPE6gCgYIKoZIzj0DAQehRANCAATFuCSofCxD31/k
          5EtammDqDwsIhMLQFRr1Kerg6ieuRPjIjUXnhf1dxjcm+f+l2iI4qZKzX3T7gWTy
          YZPr8F8Z
          -----END PRIVATE KEY-----
          ENDOFKEY
          unset APP_STORE_CONNECT_PRIVATE_KEY
          unset APP_STORE_PRIVATE_KEY
          unset APP_STORE_PRIVATE_KEY_2
          unset APP_STORE_PRIVATE_KEY_3
          export APP_STORE_CONNECT_ISSUER_ID="69c32014-81c0-4654-8dc5-7fd1cfb07338"
          export APP_STORE_CONNECT_KEY_IDENTIFIER="ML292A3H9X"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat /tmp/AuthKey.p8)"
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"
          keychain add-certificates
          cd $CM_BUILD_DIR
          xcode-project use-profiles
      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR
          xcode-project build-ipa \
            --project MODUTABLE.xcodeproj \
            --scheme MODUTABLE
    artifacts:
      - build/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
